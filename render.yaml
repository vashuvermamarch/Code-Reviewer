services:
  - type: web
    name: code-reviewer-ide
    env: node
    plan: free
    buildCommand: "npm run render-build"
    startCommand: "npm start"
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: VITE_API_URL
        value: "https://code-reviewer-ide.onrender.com" # Update with your actual URL
      - key: NODE_VERSION
        value: "18.16.0"
